<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale — Social Network</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐋</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-logo">🐋 Whale</div>
                <div id="auth-buttons" class="navbar-buttons">
                    <button class="btn-secondary" onclick="showLogin()">Login</button>
                    <button class="btn-primary" onclick="showSignup()">Sign Up</button>
                </div>
                <div id="user-menu" class="user-menu" style="display:none;">
                    <span id="current-user"></span>
                    <button onclick="logout()" class="btn-danger">Logout</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Login Modal -->
            <div id="login-modal" class="modal">
                <div class="modal-content">
                    <h2>Welcome back</h2>
                    <form onsubmit="handleLogin(event)">
                        <input type="text" id="login-username" placeholder="Username" required>
                        <input type="password" id="login-password" placeholder="Password" required>
                        <button type="submit" class="btn-primary btn-block">Login</button>
                    </form>
                    <p>Don't have an account? <a href="#" onclick="showSignup()">Sign up</a></p>
                </div>
            </div>

            <!-- Signup Modal -->
            <div id="signup-modal" class="modal" style="display:none;">
                <div class="modal-content">
                    <h2>Create account</h2>
                    <form onsubmit="handleSignup(event)">
                        <input type="text" id="signup-username" placeholder="Username" required>
                        <input type="password" id="signup-password" placeholder="Password" required>
                        <button type="submit" class="btn-primary btn-block">Sign Up</button>
                    </form>
                    <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
                </div>
            </div>

            <!-- Timeline -->
            <div id="timeline" class="timeline" style="display:none;">
                <!-- Tweet Composer -->
                <div class="tweet-composer">
                    <div class="composer-header">What's happening!?</div>
                    <textarea id="tweet-input" placeholder="Share your thoughts..." maxlength="280"></textarea>
                    <div class="composer-footer">
                        <span id="char-count">0/280</span>
                        <button onclick="postTweet()" class="btn-primary">Tweet</button>
                    </div>
                </div>

                <!-- Tweets Feed -->
                <div id="tweets-feed" class="tweets-feed"></div>
            </div>

            <!-- Profile Page -->
            <div id="profile-page" class="profile-page" style="display:none;">
                <div class="profile-header">
                    <div class="profile-banner"></div>
                    <div class="profile-info">
                        <div class="profile-avatar">🐋</div>
                        <div class="profile-details">
                            <h2 id="profile-username"></h2>
                            <p id="profile-handle"></p>
                            <p id="profile-stats"></p>
                        </div>
                    </div>
                </div>
                <div id="user-tweets" class="tweets-feed"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
