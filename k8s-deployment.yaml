# Kubernetes Deployment for Whale - Scalable to 1M+ pods
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whale-app
  labels:
    app: whale
spec:
  replicas: 10  # Start with 10, scale to 1000+
  selector:
    matchLabels:
      app: whale
  template:
    metadata:
      labels:
        app: whale
    spec:
      containers:
      - name: whale
        image: whale:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        
        # Resource limits for horizontal scaling
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        
        # Environment variables
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: whale-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: whale-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: whale-secrets
              key: secret-key
        - name: WHALE_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: whale-secrets
              key: encryption-key
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Volume mounts
        volumeMounts:
        - name: uploads
          mountPath: /app/static/uploads
      
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: whale-uploads-pvc

---
# Horizontal Pod Autoscaler - Auto-scale based on CPU/Memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: whale-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: whale-app
  minReplicas: 10
  maxReplicas: 1000000  # Scale to 1 million pods
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1000
        periodSeconds: 30
      selectPolicy: Max

---
# Service - Load balancer for pods
apiVersion: v1
kind: Service
metadata:
  name: whale-service
  labels:
    app: whale
spec:
  type: LoadBalancer
  selector:
    app: whale
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# Persistent Volume Claim for uploads
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whale-uploads-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Ti
  storageClassName: fast-ssd

---
# Ingress - Global load balancer
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whale-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  tls:
  - hosts:
    - whale.social
    - api.whale.social
    secretName: whale-tls-secret
  rules:
  - host: whale.social
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whale-service
            port:
              number: 80

---
# ConfigMap for application settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: whale-config
data:
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "40"
  REDIS_MAX_CONNECTIONS: "100"
  SESSION_TIMEOUT: "1800"
  RATE_LIMIT_DEFAULT: "200"
  ENCRYPTION_KEY_ROTATION_DAYS: "30"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: whale-secrets
type: Opaque
stringData:
  database-url: "postgresql://whale_user:CHANGE_ME@postgres:5432/whale"
  redis-url: "redis://redis-master:6379/0"
  secret-key: "CHANGE_ME_TO_RANDOM_64_CHAR_STRING"
  encryption-key: "CHANGE_ME_TO_RANDOM_32_BYTE_BASE64"

---
# PostgreSQL StatefulSet for distributed database
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: "postgres"
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "whale"
        - name: POSTGRES_USER
          value: "whale_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: whale-secrets
              key: postgres-password
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Ti

---
# Redis Cluster for distributed caching
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: "redis"
  replicas: 6
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - --appendonly yes
        - --maxmemory 4gb
        - --maxmemory-policy allkeys-lru
        - --save 60 1
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: redis-storage
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 500Gi